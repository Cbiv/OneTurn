name: OneTurn
options:
  bundleIdPrefix: com.christopherbivins
  deploymentTarget:
    iOS: "17.0"
settings:
  GENERATE_INFOPLIST_FILE: YES
  INFOPLIST_KEY_CFBundleDisplayName: "One Turn"
  INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.games"
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"
  SWIFT_VERSION: "6.0"
  ENABLE_PREVIEWS: YES
targets:
  OneTurn:
    type: application
    platform: iOS
    sources:
      - path: Sources/OneTurn
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.christopherbivins.oneturn
      TARGETED_DEVICE_FAMILY: 1
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
        - UIInterfaceOrientationPortrait
    dependencies: []
  OneTurnTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/OneTurnTests
    dependencies:
      - target: OneTurn
